spring.application.name=flowable-case-service
spring.datasource.url=jdbc:postgresql://localhost:5432/flowable?currentSchema=flowable
spring.datasource.username=flowable
spring.datasource.password=flowable
spring.datasource.driver-class-name=org.postgresql.Driver
flowable.database-schema-update=true
flowable.async-executor-activate=true
flowable.check-process-definitions=true
flowable.eventregistry.enabled=false
logging.level.root=INFO
logging.level.org.thymeleaf.spring6.processor=ERROR
logging.level.org.thymeleaf=ERROR
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
server.port=9090

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect