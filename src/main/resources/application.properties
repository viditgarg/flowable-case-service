# =========================
# APP
# =========================
spring.application.name=flowable-case-service
server.port=9090

# =========================
# H2 FILE DATABASE (PERSISTENT)
# =========================
spring.datasource.url=jdbc:h2:file:./data/flowable-db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jackson.serialization.write-dates-as-timestamps=false

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =========================
# FLOWABLE
# =========================
flowable.database-schema-update=true
flowable.async-executor-activate=true
flowable.check-process-definitions=true
flowable.eventregistry.enabled=false

# =========================
# H2 CONSOLE
# =========================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =========================
# LOGGING
# =========================
logging.level.root=INFO
logging.level.org.flowable=INFO
logging.level.org.springframework.web=INFO
logging.level.org.thymeleaf=ERROR
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n